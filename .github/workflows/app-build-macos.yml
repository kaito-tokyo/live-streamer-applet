name: Build macOS

# file: .github/workflows/app-build-macos.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-05-24

on:
  workflow_call:
    inputs:
      environment:
        description: The environment name for the build jobs, or empty string for no environment.
        required: false
        type: string
        default: ''
      codesign-enabled:
        description: Whether to enable code signing and notarization steps.
        required: true
        type: boolean
      runs-on:
        description: The runner label to run this workflow on.
        required: true
        type: string
      DEVELOPER_DIR:
        description: The value of DEVELOPER_DIR environment variable.
        required: true
        type: string

    secrets:
      APP_STORE_CONNECT_ISSUER:
        required: false
      APP_STORE_CONNECT_KEY:
        required: false
      APP_STORE_CONNECT_KEY_ID:
        required: false
      MACOS_SIGNING_APPLICATION_IDENTITY:
        required: false
      MACOS_SIGNING_CERT_PASSWORD:
        required: false
      MACOS_SIGNING_CERT:
        required: false

permissions: {}

jobs:
  build-macos-universal:
    environment: ${{ inputs.environment }}
    runs-on: ${{ inputs.runs-on}}
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      CODESIGN_ENABLED: '${{ inputs.codesign-enabled }}'
      DEVELOPER_DIR: '${{ inputs.DEVELOPER_DIR }}'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies via Homebrew
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          brew install xcodegen

      - name: Set up macOS Signing Certificates
        if: inputs.codesign-enabled
        id: codesign
        uses: ./.github/actions/setup-macos-codesigning
        with:
          MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}

      - name: Generate project
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          xcodegen generate

      - name: Build apps
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CODESIGN_TEAM: ${{ steps.codesign.outputs.CODESIGN_TEAM }}
          MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
        run: |
          mkdir -p build_macos

          for target in LiveStreamerAppletYT; do
            XCODEBUILD_ARCHIVE_ARGS=(
              -project LiveStreamerApplet.xcodeproj
              -scheme "$target"
              -configuration Release
              -archivePath "build_macos/$target.xcarchive"
            )

            if [[ "$CODESIGN_ENABLED" == true ]]; then
              XCODEBUILD_ARCHIVE_ARGS+=(
                DEVELOPMENT_TEAM="$CODESIGN_TEAM"
                CODE_SIGN_IDENTITY="$MACOS_SIGNING_APPLICATION_IDENTITY" \
                CODE_SIGN_STYLE=Manual
              )
            fi

            xcodebuild archive "${XCODEBUILD_ARCHIVE_ARGS[@]}"
          done

      - name: Create dmg
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          mkdir -p build_dmg
          cp -a build_macos/*.xcarchive/Products/Applications/*.app build_dmg/
          diskutil image create from --format ULMO --volumeName "LiveStreamerApplet" build_dmg LiveStreamerApplet.dmg

      - name: Notarize dmg
        if: inputs.codesign-enabled
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          APP_STORE_CONNECT_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          KEY_FILE="$(mktemp -t APP_STORE_CONNECT_KEY)"

          printenv APP_STORE_CONNECT_KEY >"$KEY_FILE"

          for dmg in *.dmg; do
            xcrun notarytool submit "$dmg" \
              --issuer "$APP_STORE_CONNECT_ISSUER" \
              --key "$KEY_FILE" \
              --key-id "$APP_STORE_CONNECT_KEY_ID" \
              --wait

            xcrun stapler staple "$dmg"
          done

      - name: Upload apps dmg
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-streamer-applet-dmg-${{ github.run_id }}
          path: |
            *.dmg
          if-no-files-found: warn
          retention-days: 7
