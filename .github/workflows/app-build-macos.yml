name: App build macOS

# file: .github/workflows/app-build-macos.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-06-29

on:
  workflow_call:
    inputs:
      environment:
        description: Runner environment
        required: false
        type: string
        default: ''

permissions: {}

env:
  HOMEBREW_NO_ANALYTICS: '1'
  HOMEBREW_NO_AUTO_UPDATE: '1'
  HOMEBREW_NO_ENV_HINTS: '1'
  HOMEBREW_NO_INSTALL_CLEANUP: '1'

jobs:
  app-build-macos-swift:
    runs-on: macos-26

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate project using XcodeGen
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          xcodebuild build \
            -project LiveStreamerApplet.xcodeproj \
            -target LiveStreamerApplet \
            -sdk macosx \
            -arch arm64 \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
