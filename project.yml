name: LiveStreamerApplet

options:
  bundleIdPrefix: tokyo.kaito.live-streamer-applet
  deploymentTarget:
    macOS: '15.0'
  xcodeVersion: '26.0'

settings:
  base:
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_VERSION: '6.3'

targets:
  LiveStreamerAppletYT:
    type: application
    platform: macOS
    sources:
      - path: Sources/StreamerAppletYT
      - path: Resources/StreamerAppletYT
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: '1'
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Live Streamer Applet YT
        MARKETING_VERSION: '0.1.0'
